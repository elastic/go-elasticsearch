# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

[extend]
# Use the default gitleaks config as a base
useDefault = true

[allowlist]
  description = "Historic false positives: test certificates and generated API code"
  paths = [
    '''\.buildkite/certs/''',
    '''\.ci/certs/''',
    '''\.jenkins/certs/''',
    '''estransport/testdata/''',
    '''typedapi/''',
  ]

[[rules]]
id = "private-key"
description = "Private Key"

[rules.allowlist]
paths = [
    # Test file contains embedded test certificates for unit testing
    '''elasticsearch_internal_test\.go''',
]
